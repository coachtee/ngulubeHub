<!-- Ngulube Hub — pig-nose logo
     Faithful to the original: two large outward-pointing triangular ears
     meeting near the top center (X-pattern), wide rounded snout with two
     round nostrils, navy stroke outline. Reads on cream/white/dark.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32" role="img" aria-label="Ngulube Hub">
  <!-- Left ear: large triangle, tip pointing up-and-out to the upper-left -->
  <polygon points="2,2 32,32 2,32" fill="none" stroke="#1F2D5C" stroke-width="3" stroke-linejoin="round"/>
  <!-- Right ear: mirror, tip pointing up-and-out to the upper-right -->
  <polygon points="62,2 32,32 62,32" fill="none" stroke="#1F2D5C" stroke-width="3" stroke-linejoin="round"/>
  <!-- Snout: wide rounded rectangle, sits below the ear X -->
  <rect x="8" y="28" width="48" height="32" rx="16" fill="none" stroke="#1F2D5C" stroke-width="3"/>
  <!-- Two nostril holes (navy filled circles) -->
  <circle cx="24" cy="44" r="4.5" fill="#1F2D5C"/>
  <circle cx="40" cy="44" r="4.5" fill="#1F2D5C"/>
</svg>
