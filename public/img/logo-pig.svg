<!-- Ngulube Hub — pig-nose logo.
     Navy face with prominent orange snout. Designed to read well on both
     dark navy backgrounds (navy ears blend but orange pops) and light
     cream/white backgrounds (navy face + orange snout are high contrast).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32" role="img" aria-label="Ngulube Hub">
  <!-- Triangular pig ears (navy) -->
  <polygon points="18,20 6,8 24,14" fill="#1F2D5C"/>
  <polygon points="46,20 58,8 40,14" fill="#1F2D5C"/>
  <!-- Inner-ear highlight (slight orange peek) -->
  <polygon points="16,18 12,12 22,15" fill="#F26B4A" opacity="0.35"/>
  <polygon points="48,18 52,12 42,15" fill="#F26B4A" opacity="0.35"/>
  <!-- Face: navy rounded square -->
  <rect x="6" y="16" width="52" height="40" rx="12" fill="#1F2D5C"/>
  <!-- Snout: large orange ellipse - the brand-recognizable feature -->
  <ellipse cx="32" cy="38" rx="22" ry="13" fill="#F26B4A"/>
  <!-- Subtle snout edge -->
  <ellipse cx="32" cy="38" rx="22" ry="13" fill="none" stroke="#1F2D5C" stroke-width="0.6" opacity="0.18"/>
  <!-- Nostrils: navy on orange -->
  <ellipse cx="24" cy="38" rx="3" ry="5" fill="#1F2D5C"/>
  <ellipse cx="40" cy="38" rx="3" ry="5" fill="#1F2D5C"/>
  <!-- Small white shine highlight -->
  <circle cx="20" cy="32" r="1.5" fill="#fff" opacity="0.4"/>
</svg>
